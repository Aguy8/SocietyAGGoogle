  <rect x="640" y="36" width="530" height="558" rx="20" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#softShadow)"/>

  <!-- Browser bar -->
  <rect x="640" y="36" width="530" height="48" rx="20" fill="rgba(255,255,255,0.05)"/>
  <rect x="640" y="60" width="530" height="24" fill="rgba(255,255,255,0.05)"/>
  <!-- Traffic lights -->
  <circle cx="670" cy="60" r="6" fill="#FF5F57"/>
  <circle cx="690" cy="60" r="6" fill="#FFBD2E"/>
  <circle cx="710" cy="60" r="6" fill="#28C840"/>

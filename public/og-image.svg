  <rect x="72" y="506" width="116" height="30" rx="15" fill="rgba(14,71,171,0.22)" stroke="rgba(14,71,171,0.55)" stroke-width="1"/>
  <text x="130" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.82)" text-anchor="middle">Associations</text>

  <rect x="198" y="506" width="74" height="30" rx="15" fill="rgba(14,71,171,0.22)" stroke="rgba(14,71,171,0.55)" stroke-width="1"/>
  <text x="235" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.82)" text-anchor="middle">ONG</text>

  <rect x="282" y="506" width="95" height="30" rx="15" fill="rgba(14,71,171,0.22)" stroke="rgba(14,71,171,0.55)" stroke-width="1"/>
  <text x="330" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.82)" text-anchor="middle">Mutuelles</text>

  <rect x="387" y="506" width="80" height="30" rx="15" fill="rgba(14,71,171,0.22)" stroke="rgba(14,71,171,0.55)" stroke-width="1"/>
  <text x="427" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.82)" text-anchor="middle">Alumni</text>

  <rect x="477" y="506" width="90" height="30" rx="15" fill="rgba(14,71,171,0.22)" stroke="rgba(14,71,171,0.55)" stroke-width="1"/>
  <text x="522" y="526" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.82)" text-anchor="middle">Leaders</text>


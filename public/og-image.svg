<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07091A"/>
      <stop offset="100%" stop-color="#0A1232"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E47AB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0E47AB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#151D3A"/>
      <stop offset="100%" stop-color="#0D1428"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0E47AB"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#D4A75B"/>
    </linearGradient>
    <linearGradient id="greenBadge" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F8B4F"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="640" y="36" width="530" height="558" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="950" cy="160" r="280" fill="#0E47AB" opacity="0.18" filter="url(#glow)"/>
  <circle cx="160" cy="520" r="200" fill="#D4A75B" opacity="0.10" filter="url(#glow)"/>
  <circle cx="600" cy="80" r="150" fill="#0E47AB" opacity="0.08" filter="url(#glow)"/>

  <!-- Subtle dot grid left side -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect x="0" y="0" width="620" height="630" fill="url(#dots)"/>

  <!-- ── LEFT SIDE ── -->

  <!-- Society wordmark -->
  <text x="72" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#D4A75B" letter-spacing="-1">Society</text>
  <text x="236" y="108" font-family="Georgia, serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.2)">.</text>

  <!-- Launch badge -->
  <rect x="72" y="128" width="188" height="26" rx="13" fill="rgba(212,167,91,0.12)" stroke="rgba(212,167,91,0.35)" stroke-width="1"/>
  <circle cx="90" cy="141" r="4" fill="#D4A75B"/>
  <text x="100" y="146" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#D4A75B" letter-spacing="0.8">Bêta ouverte · Abidjan</text>

  <!-- Main headline -->
  <text x="72" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="800" fill="white" letter-spacing="-2.5">L'infrastructure</text>
  <text x="72" y="295" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="800" fill="white" letter-spacing="-2.5">numérique des</text>
  <text x="72" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="800" fill="#D4A75B" letter-spacing="-2.5">communautés</text>
  <text x="72" y="433" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="800" fill="#D4A75B" letter-spacing="-2.5">africaines.</text>


services:
  - type: web
    name: society-api
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix src/server
    startCommand: node src/server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/society.db
      - key: CORS_ORIGIN
        value: https://aguy8.github.io
    disk:
      name: society-db
      mountPath: /var/data
      sizeGB: 1

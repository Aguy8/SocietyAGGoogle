name: Deploy to GitHub Pages

# Society est un repo privé — le déploiement public se fait via sync-to-ci.yml → Society.ci
# Ce workflow est désactivé (déclencher manuellement si besoin de test local)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /Society/
